name: Build Application

# on:
#   push:
#     tags:
#       - 'v*.*'
#   workflow_dispatch:

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The tag to release'
        required: true

permissions:
  contents: write

# ====================================================
# [配置区域] 修改这里的变量即可适配新项目
# ====================================================
env:
  APP_NAME: VIUSomeIPClient        # 生成的软件名称 (不要包含 .exe)
  ENTRY_SCRIPT: main.py       # Python 入口脚本文件名
  PYTHON_VER: '3.11'          # Python 版本
  ICON_PATH: icon.ico         # 图标路径 (如果没有图标，请删除下面 Nuitka 参数中的相关行)
# ====================================================

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: 'pip'

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install --upgrade pip
          pip install nuitka
          
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          } else {
            # 如果没有 requirements.txt，可以在这里作为备用手动安装
            pip install pyside6 pydantic requests lark-oapi
          }
      
      - name: 设置 Nuitka 自定义缓存目录
        shell: pwsh
        run: |
          echo "NUITKA_CACHE_DIR=${{ github.workspace }}\nuitka_cache" >> $env:GITHUB_ENV

      # ===========================
      # 缓存Nuitka到GitHub
      # ===========================
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.NUITKA_CACHE_DIR }}
          key: ${{ runner.os }}-nuitka-${{ env.PYTHON_VER }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nuitka-${{ env.PYTHON_VER }}-
            ${{ runner.os }}-nuitka-

      - name: Build with Nuitka (Command Line)
        shell: pwsh
        run: |
          # 动态计算 PySide6 的插件目录路径，赋值给 $qtPluginsPath
          $qtPluginsPath = (python -c "import PySide6; import os; print(os.path.join(PySide6.__path__[0], 'plugins'))")

          # 使用变量构建命令
          python -m nuitka `
            --standalone `
            --follow-imports `
            --assume-yes-for-downloads `
            --lto=yes `
            --output-dir="${{ github.workspace }}/dist" `
            --output-filename=${{ env.APP_NAME }}.exe `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --include-data-files="${{ github.workspace }}/README.md=README.md" `
            --include-data-files="${{ github.workspace }}/fuse_id.json=fuse_id.json" `
            ${{ env.ENTRY_SCRIPT }}
#            --include-plugin-directory="$qtPluginsPath\sqldrivers" `
#            --windows-disable-console `
#             --windows-icon-from-ico=${{ env.ICON_PATH }} `

      - name: Prepare Artifacts
        id: prepare_artifact
        shell: pwsh
        run: |
          # 直接获取通过 workflow_dispatch 传进来的 tag 参数
          $tag = "${{ inputs.release_tag }}"
          Write-Host "Current building tag: $tag"
          
          # 使用环境变量和 tag 构建文件名
          $appName = "${{ env.APP_NAME }}"
          $releaseName = "${appName}_$tag"
          $zipName = "${appName}-${tag}.7z"
          
          New-Item -ItemType Directory -Force -Path $releaseName
          
          # 移动 Nuitka 生成的产物
          Move-Item -Path "dist\*.dist\*" -Destination $releaseName
          
          # 压缩
          7z a -t7z $zipName $releaseName
          
          # 将参数传给发布步骤
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          echo "TAG_NAME=$tag" >> $env:GITHUB_ENV

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}         # 比如这里就会是传进来的 v1.2
          name: Release ${{ env.TAG_NAME }}     # Release 的标题
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
